name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the code
    - name: Checkout code
      uses: actions/checkout@v2

    # Step 2: Generate version number
    - name: Generate version number
      run: |
        DATE=$(date +'%Y%m%d')
        RELEASE_VERSION="${DATE}.${{ github.run_number }}"
        echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV 
    - name: Add version to deployment.yaml
      run: |
        sed -i 's/\${VERSION}/${{ env.RELEASE_VERSION }}/g' deployment.yaml

    # Step 3: Log in to Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Step 4: Build and push Docker image
    - name: Build and push Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/website-app:v${{ env.RELEASE_VERSION }} .
        docker push ${{ secrets.DOCKER_USERNAME }}/website-app:v${{ env.RELEASE_VERSION }}

    # Step 5: Set up kubectl
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    # Step 6: Configure kubeconfig
    - name: Set up kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

    # Step 7: Deploy to Kubernetes
    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f deployment.yaml
        kubectl set image deployment/portfolio-deployment portfolio=${{ secrets.DOCKER_USERNAME }}/website-app:v${{ env.RELEASE_VERSION }}