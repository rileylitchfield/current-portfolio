apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: letsencrypt-production
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: "nginx"
  tls:
    - hosts:
        - rileylitchfield.com
        - www.rileylitchfield.com
      secretName: portfolio-tls
  rules:
    - host: rileylitchfield.com
      http:
        paths:
          # Route /store and any subpaths to your eCommerce service
          - path: /store(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ecommerce-project       # Change this to the service name for your store
                port:
                  number: 80                  # Make sure this matches your eCommerce service port
          # Route all other paths to your portfolio service
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portfolio-service       # Your portfolio service name
                port:
                  number: 80